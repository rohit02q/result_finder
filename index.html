<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Finder Pro</title>

<style>
body {
  font-family: system-ui;
  background: #f3f6fb;
  margin: 0;
  padding: 12px;
}

.container {
  max-width: 480px;
  margin: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  margin-bottom: 12px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  font-weight: bold;
  margin-top: 10px;
}

button:active {
  transform: scale(0.98);
}

.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}

.status {
  text-align: center;
  font-size: 14px;
  margin-top: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

th {
  text-align: left;
}

td:last-child, th:last-child {
  text-align: right;
}

.download {
  background: #10b981;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🎯 Result Finder</h2>

<input id="rollCode" placeholder="Roll Code">
<input id="start" type="number" placeholder="Start With">
<input id="end" type="number" placeholder="End With">
<input id="min" type="number" placeholder="Min Marks">
<input id="max" type="number" placeholder="Max Marks">

<button onclick="start()">Check Results</button>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="status" id="status"></div>

</div>

<div class="card">
<table>
<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Marks</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="3" style="text-align:center;">No Data</td></tr>
</tbody>
</table>

<button class="download" onclick="downloadCSV()">Download CSV</button>

</div>

</div>

<script>

let finalResults = [];

async function start() {
  const rollCode = document.getElementById("rollCode").value;
  const startVal = +document.getElementById("start").value;
  const endVal = +document.getElementById("end").value;
  const min = +document.getElementById("min").value;
  const max = +document.getElementById("max").value;

  const bar = document.getElementById("bar");
  const status = document.getElementById("status");
  const tbody = document.getElementById("tbody");

  finalResults = [];
  tbody.innerHTML = "";

  let total = endVal - startVal + 1;
  let done = 0;

  const BATCH_SIZE = 10;

  for (let i = startVal; i <= endVal; i += BATCH_SIZE) {
    let batch = [];

    for (let j = i; j < i + BATCH_SIZE && j <= endVal; j++) {
      const rollNo = 2600000 + j;

      batch.push(
        fetch(`https://api.matricbiharboard.com/result?roll_code=${rollCode}&roll_no=${rollNo}`)
        .then(res => res.json())
        .then(json => {
          done++;

          let percent = (done / total) * 100;
          bar.style.width = percent + "%";
          status.innerText = `Processing ${done}/${total}`;

          if (json.success) {
            const d = json.data;

            if (d.total >= min && d.total <= max) {
              finalResults.push({
                roll: rollNo,
                name: d.name,
                marks: d.total
              });
            }
          }
        })
        .catch(() => done++)
      );
    }

    await Promise.all(batch);
  }

  finalResults.sort((a,b) => b.marks - a.marks);

  if (finalResults.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3">No Results Found</td></tr>`;
    return;
  }

  tbody.innerHTML = finalResults.map(r => `
    <tr>
      <td>${r.roll}</td>
      <td>${r.name}</td>
      <td>${r.marks}</td>
    </tr>
  `).join("");

  status.innerText = "Done ✅";
}


function downloadCSV() {
  if (finalResults.length === 0) return alert("No Data");

  let csv = "Roll,Name,Marks\n";

  finalResults.forEach(r => {
    csv += `${r.roll},${r.name},${r.marks}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "results.csv";
  a.click();
}

</script>

</body>
</html>
